{% extends 'base.html' %}

{% block title %}Admin Login - Animal Rescue{% endblock %}

{% block content %}
<div class="container py-5 mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header border-0 text-white text-center py-4" style="background-color: #343a40;">
                    <i class="bi bi-shield-lock-fill fs-1 mb-2 d-block text-warning"></i>
                    <h3 class="mb-0 fw-bold">Admin Portal</h3>
                </div>
                <div class="card-body p-4 p-md-5 bg-white">
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-4">
                            <label for="username" class="form-label fw-bold text-dark">Username <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-person-fill text-secondary"></i></span>
                                <input type="text" class="form-control form-control-lg border-start-0 bg-light px-2"
                                    id="username" name="username" placeholder="Enter admin username" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="password" class="form-label fw-bold text-dark">Password <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-key-fill text-secondary"></i></span>
                                <input type="password" class="form-control form-control-lg border-start-0 bg-light px-2"
                                    id="password" name="password" placeholder="Enter admin password" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 text-center mt-2">
                            <button type="submit" class="btn btn-dark btn-lg py-3 fs-5 fw-bold w-100">Login <i
                                    class="bi bi-box-arrow-in-right ms-2"></i></button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 border-0">
                    <a href="{{ url_for('index') }}" class="text-muted text-decoration-none fw-bold"><i
                            class="bi bi-arrow-left me-1"></i> Back to the rescue site</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
